# ============================================================================
#  Full stack for the "Keeping Eyes on Your Agents" trip-planner demo.
#
#    4 mock MCP servers  +  FastAPI agent API  +  Next.js UI
#
#  Quick start:
#    1) copy .env.example to .env and set OPENAI_API_KEY
#    2) docker compose up --build
#    3) open http://localhost:3000   (API at http://localhost:8000)
#
#  Optional Layer-4 gateway (Obot):
#    docker compose --profile gateway up --build
# ============================================================================

x-app: &app
  build:
    context: .
  image: trip-planner-app:local
  restart: unless-stopped
  networks: [tripnet]

services:
  # ---- Mock MCP servers (the "context layer" / tools) ---------------------
  flights:
    <<: *app
    command: ["python", "mcp_servers/flights_server.py"]
    environment:
      MCP_HOST: "0.0.0.0"
    ports: ["8001:8001"]

  hotels:
    <<: *app
    command: ["python", "mcp_servers/hotels_server.py"]
    environment:
      MCP_HOST: "0.0.0.0"
    ports: ["8002:8002"]

  activities:
    <<: *app
    command: ["python", "mcp_servers/activities_server.py"]
    environment:
      MCP_HOST: "0.0.0.0"
    ports: ["8003:8003"]

  booking:
    <<: *app
    command: ["python", "mcp_servers/booking_server.py"]
    environment:
      MCP_HOST: "0.0.0.0"
    ports: ["8004:8004"]

  # ---- Agent API (LangGraph + DeepEval) ----------------------------------
  api:
    <<: *app
    command:
      ["python", "-m", "uvicorn", "server.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      DEEPEVAL_JUDGE_MODEL: ${DEEPEVAL_JUDGE_MODEL:-gpt-4o}
      PRICE_INPUT_PER_M: ${PRICE_INPUT_PER_M:-0.15}
      PRICE_OUTPUT_PER_M: ${PRICE_OUTPUT_PER_M:-0.60}
      # Reach the MCP servers by their compose service names.
      MCP_FLIGHTS_URL: http://flights:8001/mcp
      MCP_HOTELS_URL: http://hotels:8002/mcp
      MCP_ACTIVITIES_URL: http://activities:8003/mcp
      MCP_BOOKING_URL: http://booking:8004/mcp
      USE_MCP_GATEWAY: ${USE_MCP_GATEWAY:-false}
      # Layer 4: route MCP traffic through the Obot gateway so every tool call is
      # observed. These are Obot "connect" URLs for the catalog entries we create
      # (reachable from this container via the `obot` service name). Used only
      # when USE_MCP_GATEWAY=true. IDs come from Obot and persist in obot-data.
      MCP_GATEWAY_FLIGHTS_URL: ${MCP_GATEWAY_FLIGHTS_URL:-http://obot:8080/mcp-connect/default-trip-flights-mock-8cb52630pkb85}
      MCP_GATEWAY_HOTELS_URL: ${MCP_GATEWAY_HOTELS_URL:-http://obot:8080/mcp-connect/default-trip-hotels-mock-50f96e7esz8ht}
      MCP_GATEWAY_ACTIVITIES_URL: ${MCP_GATEWAY_ACTIVITIES_URL:-http://obot:8080/mcp-connect/default-trip-activities-mock-d795da428hfzr}
      MCP_GATEWAY_BOOKING_URL: ${MCP_GATEWAY_BOOKING_URL:-http://obot:8080/mcp-connect/default-trip-booking-mock-cc2447b8sx7wj}
      INJECT_REGRESSION: ${INJECT_REGRESSION:-false}
      # Persist eval run history / uploaded goldens / tool tally across container
      # recreation (mounted volume below).
      EVAL_DATA_DIR: /app/.data
      # Pin DeepEval's scratch cache to a stable ABSOLUTE dir (the default is the
      # relative ".deepeval", resolved per-call against the cwd).
      DEEPEVAL_CACHE_FOLDER: /app/.deepeval
      # Don't persist DeepEval test runs to local disk. We read results straight
      # from the eval iterator (in-memory) and view traces in Langfuse/Confident,
      # so the local cache is unused. Disabling it removes a benign but noisy
      # race where a trailing trace flush hits the temp file DeepEval already
      # deleted at wrap-up ("Could not update test run on disk").
      DEEPEVAL_FILE_SYSTEM: READ_ONLY
      # Obot link surfaced in the Eval Studio dashboard (browser-reachable URL).
      OBOT_PUBLIC_URL: ${OBOT_PUBLIC_URL:-http://localhost:8080}
      # Layer 3 trace timeline via self-hosted Langfuse (open-source). The agent
      # posts traces to the in-network service; the UI links to the browser URL.
      # Keys are auto-provisioned by langfuse-web via LANGFUSE_INIT_* below.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-datahack-public}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-datahack-secret}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-web:3000}
      LANGFUSE_PUBLIC_URL: ${LANGFUSE_PUBLIC_URL:-http://localhost:3001}
      LANGFUSE_PROJECT_ID: ${LANGFUSE_PROJECT_ID:-trip-planner}
      LANGFUSE_TRACING_ENABLED: ${LANGFUSE_TRACING_ENABLED:-true}
      # Optional: set CONFIDENT_API_KEY in .env to stream traces to Confident AI.
      CONFIDENT_API_KEY: ${CONFIDENT_API_KEY:-}
      CONFIDENT_TRACE_VERBOSE: ${CONFIDENT_TRACE_VERBOSE:-0}
      # Flush traces on exit so short-lived runs (eval scripts) also post; the
      # long-running API server posts continuously regardless.
      CONFIDENT_TRACE_FLUSH: ${CONFIDENT_TRACE_FLUSH:-1}
    volumes:
      - eval-data:/app/.data
    ports: ["8000:8000"]
    depends_on: [flights, hotels, activities, booking]

  # ---- Next.js UI --------------------------------------------------------
  web:
    build:
      context: ./web
      args:
        # The browser talks to the API on the host-published port.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    image: trip-planner-web:local
    restart: unless-stopped
    networks: [tripnet]
    ports: ["3000:3000"]
    depends_on: [api]

  # ---- Obot gateway (Layer 4 — codeless MCP observability) ----------------
  obot:
    image: ghcr.io/obot-platform/obot:latest
    networks: [tripnet]
    ports: ["8080:8080"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Auth DISABLED for the local demo => no login token needed; just open the
      # UI. Safe only on a trusted local machine: with auth off, anyone who can
      # reach :8080 can manage/launch MCP servers. Re-enable for anything else.
      OBOT_SERVER_ENABLE_AUTHENTICATION: "false"
      OBOT_SERVER_HOSTNAME: localhost:8080
      # The mock MCP servers live on the docker bridge network (private IPs like
      # flights:8001 -> 172.x). Obot blocks private/localhost/link-local MCP URLs
      # by default (SSRF protection); opt out for this local demo. Both spellings
      # of the private-IP flag are set due to an acronym-casing bug in older
      # builds (see obot-platform/obot#7001).
      OBOT_SERVER_DISALLOW_PRIVATE_IP_MCP: "false"
      OBOT_SERVER_DISALLOW_PRIVATE_IPMCP: "false"
      OBOT_SERVER_DISALLOW_LOCALHOST_MCP: "false"
      OBOT_SERVER_DISALLOW_LINK_LOCAL_MCP: "false"
    volumes:
      - obot-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on: [flights, hotels, activities, booking]

  # ---- Langfuse (Layer 3 — self-hosted trace timeline) --------------------
  # Open-source alternative to Confident AI. langfuse-web auto-provisions an org,
  # project, and API keys on first boot (LANGFUSE_INIT_*), so the api service can
  # post traces immediately with no manual login. UI: http://localhost:3001
  # (login admin@datahack.local / langfuse-demo). All secrets below are local
  # demo values for a self-hosted instance — not real cloud credentials.
  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    restart: unless-stopped
    networks: [tripnet]
    depends_on: &langfuse-deps
      langfuse-postgres: {condition: service_healthy}
      langfuse-minio: {condition: service_healthy}
      langfuse-redis: {condition: service_healthy}
      langfuse-clickhouse: {condition: service_healthy}
    ports: ["3001:3000"]
    environment: &langfuse-env
      DATABASE_URL: postgresql://postgres:postgres@langfuse-postgres:5432/postgres
      SALT: datahack-salt
      ENCRYPTION_KEY: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://localhost:9090
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: datahack-redis
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: datahack-nextauth-secret
      # Auto-provision org/project/keys/user on first boot (idempotent).
      LANGFUSE_INIT_ORG_ID: datahack
      LANGFUSE_INIT_ORG_NAME: Data Hack Summit
      LANGFUSE_INIT_PROJECT_ID: trip-planner
      LANGFUSE_INIT_PROJECT_NAME: Trip Planner
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-datahack-public
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-datahack-secret
      LANGFUSE_INIT_USER_EMAIL: admin@datahack.local
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_USER_PASSWORD: langfuse-demo

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    restart: unless-stopped
    networks: [tripnet]
    depends_on: *langfuse-deps
    environment: *langfuse-env

  langfuse-clickhouse:
    image: docker.io/clickhouse/clickhouse-server
    restart: unless-stopped
    networks: [tripnet]
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - langfuse-clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  langfuse-minio:
    image: docker.io/minio/minio
    restart: unless-stopped
    networks: [tripnet]
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports: ["9090:9000"]
    volumes:
      - langfuse-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  langfuse-redis:
    image: docker.io/redis:7
    restart: unless-stopped
    networks: [tripnet]
    command: --requirepass datahack-redis --maxmemory-policy noeviction
    volumes:
      - langfuse-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "datahack-redis", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  langfuse-postgres:
    image: docker.io/postgres:17
    restart: unless-stopped
    networks: [tripnet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    volumes:
      - langfuse-postgres-data:/var/lib/postgresql/data

networks:
  tripnet:
    driver: bridge

volumes:
  obot-data:
  eval-data:
  langfuse-postgres-data:
  langfuse-clickhouse-data:
  langfuse-clickhouse-logs:
  langfuse-minio-data:
  langfuse-redis-data:
